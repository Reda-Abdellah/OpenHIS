name: pacs-demo

networks:
  pacs-net:
    driver: bridge

volumes:
  pg-data:
  orthanc-data:
  ris-data:
  ai-jobs:
  ai-controller-db:
  ehr-data:
  lis-data:

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: orthanc
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [pacs-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 10s
      timeout: 5s
      retries: 5

  orthanc:
    image: orthancteam/orthanc
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORTHANC__POSTGRESQL__HOST: postgres
      ORTHANC__POSTGRESQL__DATABASE: orthanc
      ORTHANC__POSTGRESQL__USERNAME: orthanc
      ORTHANC__POSTGRESQL__PASSWORD: orthanc
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__PYTHON_SCRIPT: /etc/orthanc/plugin.py
      AI_CONTROLLER_URL: http://ai-controller:8000
      FHIR_BRIDGE_URL: http://fhir-bridge:8005
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./orthanc/plugin.py:/etc/orthanc/plugin.py:ro
      - orthanc-data:/var/lib/orthanc/db
    ports:
      - "4242:4242"
    networks: [pacs-net]
    restart: unless-stopped

  ohif:
    image: ohif/app:latest
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    networks: [pacs-net]
    restart: unless-stopped

  simulator:
    build: ./simulator
    environment:
      ORTHANC_URL: http://orthanc:8042
    networks: [pacs-net]
    restart: unless-stopped

  ris:
    build: ./ris
    environment:
      DB_PATH: /data/ris.db
      ORTHANC_URL: http://orthanc:8042
    volumes:
      - ris-data:/data
    networks: [pacs-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-controller:
    build: ./ai-controller
    environment:
      ORTHANC_URL: http://orthanc:8042
      RIS_URL: http://ris:8002/api
      DB_PATH: /data/ai-controller.db
      JOBS_DATA_DIR: /data/jobs
      JOBS_VOLUME_NAME: pacs-demo_ai-jobs
      DOCKER_NETWORK: pacs-demo_pacs-net
      POC_XRAY_IMAGE: pacs-demo/poc-xray:latest
      POC_CT_IMAGE: pacs-demo/poc-ct:latest
      FHIR_BRIDGE_URL: http://fhir-bridge:8005
    volumes:
      - ai-jobs:/data/jobs
      - /var/run/docker.sock:/var/run/docker.sock
      - ai-controller-db:/data
    networks: [pacs-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  poc-xray-pipeline:
    build: ./pipelines/poc-xray
    image: pacs-demo/poc-xray:latest
    restart: "no"
    command: ["true"]
    networks: [pacs-net]

  poc-ct-pipeline:
    build: ./pipelines/poc-ct
    image: pacs-demo/poc-ct:latest
    restart: "no"
    command: ["true"]
    networks: [pacs-net]

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ohif/ai-panel.html:/usr/share/nginx/html/ai-panel.html:ro
      - ./portal/index.html:/usr/share/nginx/html/index.html:ro
    depends_on: [orthanc, ohif, simulator, ris, ai-controller]
    networks: [pacs-net]
    restart: unless-stopped

  ehr:
    build: ./ehr
    environment:
      DBPATH: /data/ehr.db
      FHIR_BRIDGE_URL: http://fhir-bridge:8005/api
      RIS_URL: http://ris:8002/api
      LIS_URL: http://lis:8004/api
      ROOT_PATH: /ehr
    volumes:
      - ehr-data:/data
    networks:
      - pacs-net
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:8003/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  lis:
    build: ./lis
    environment:
      DBPATH: /data/lis.db
      EHR_URL: http://ehr:8003/api
      FHIR_BRIDGE_URL: http://fhir-bridge:8005/api
      ROOT_PATH: /lis
    volumes:
      - lis-data:/data
    networks:
      - pacs-net
    restart: unless-stopped
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:8004/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  fhir-bridge:
    build: ./fhir-bridge
    environment:
      EHR_URL: http://ehr:8003/api
      RIS_URL: http://ris:8002/api
      LIS_URL: http://lis:8004/api
      ORTHANC_URL: http://orthanc:8042
      AI_CONTROLLER_URL: http://ai-controller:8000/api
      FHIR_SERVER_URL: http://fhir-server:8080/fhir    # set empty to disable
      FHIR_ENABLED: "true"
    networks:
      - pacs-net
    restart: unless-stopped
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:8005/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  fhir-server:
    image: hapiproject/hapi:latest
    volumes:
      - ./fhir/application.yaml:/data/hapi/application.yaml:ro
    environment:
      SPRING_CONFIG_LOCATION: file:///data/hapi/application.yaml
    networks:
      - pacs-net
    restart: unless-stopped
    depends_on:
      - postgres
    profiles:
      - fhir    # opt-in: docker compose --profile fhir up -d