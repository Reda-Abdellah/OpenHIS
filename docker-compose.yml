name: openhis

networks:
  openhis-net:
    driver: bridge



volumes:
  pg-data:
  orthanc-data:
  ris-data:
  ai-jobs:
  ai-controller-db:
  analytics-data:
  hl7-data:
  portal-sessions:
  # Phase 1 — OpenMRS
  openmrs-mysql:
  openmrs-data:
  # Phase 2 — OpenELIS
  openelis-pg:
  openelis-lucene:
  # Phase 3 — Odoo
  odoo-pg:
  odoo-data:
  # Phase 4/6 — Integration Hub audit log
  hub-audit:

services:

  # ── Phase 1: OpenMRS O3 ──────────────────────────────────────────────────
  #
  # openmrs-db: MySQL 8 dedicated to OpenMRS.
  #   - lower_case_table_names=1 is REQUIRED on Linux (case-sensitive FS).
  #     It must be set on first init; changing it later requires a full dump/restore.
  #   - utf8mb4 is required for emoji/extended Unicode in clinical text.
  #
  openmrs-db:
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --lower_case_table_names=1
      --log_bin_trust_function_creators=1
    environment:
      MYSQL_ROOT_PASSWORD: openmrs_root
      MYSQL_DATABASE: openmrs
      MYSQL_USER: openmrs
      MYSQL_PASSWORD: openmrs
    volumes:
      - openmrs-mysql:/var/lib/mysql
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-popenmrs_root"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # openmrs: O3 backend (Tomcat + OpenMRS WAR + fhir2 + bundled modules).
  #   First boot runs all Liquibase migrations — expect 10-15 min before healthy.
  #   REST API:   http://localhost/openmrs/ws/rest/v1/
  #   FHIR R4:    http://localhost/openmrs/ws/fhir2/R4/
  #   Default credentials: admin / Admin123  (change after first login)
  #
  openmrs:
    image: openmrs/openmrs-reference-application-3-backend:nightly
    depends_on:
      openmrs-db:
        condition: service_healthy
    environment:
      OMRS_DB_HOSTNAME: openmrs-db
      OMRS_DB_PORT: 3306
      OMRS_DB_NAME: openmrs
      OMRS_DB_USERNAME: openmrs
      OMRS_DB_PASSWORD: openmrs
      OMRS_CREATE_TABLES: "true"
      OMRS_AUTO_UPDATE_DATABASE: "true"
      OMRS_ADMIN_USER_PASSWORD: Admin123
    volumes:
      - openmrs-data:/openmrs/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/openmrs/health/started"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  # openmrs-frontend: O3 SPA (nginx serving the React microfrontend).
  #   Accessible at http://localhost/openmrs/spa
  #   API_URL must match the path where the backend is reachable from the browser.
  #
  openmrs-frontend:
    image: openmrs/openmrs-reference-application-3-frontend:nightly
    depends_on:
      openmrs:
        condition: service_healthy
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/config.json
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/openmrs/spa/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Phase 2: OpenELIS Global 2 ───────────────────────────────────────────────
  #
  # openelis-db: Dedicated PostgreSQL instance for OpenELIS.
  #   OpenELIS requires a database named 'clinlims' owned by user 'clinlims'.
  #   Liquibase migrations run on first boot — expect 3-5 min before the app
  #   becomes healthy.
  #
  openelis-db:
    image: postgres:14
    environment:
      POSTGRES_DB: clinlims
      POSTGRES_USER: clinlims
      POSTGRES_PASSWORD: clinlims
    volumes:
      - openelis-pg:/var/lib/postgresql/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinlims -d clinlims"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # openelis: OpenELIS Global 2 (Tomcat + Spring Boot webapp).
  #   FHIR R4:    http://localhost:8082/fhir/R4/
  #   Admin UI:   http://localhost:8082/
  #   Default credentials: admin / adminADMIN!
  #
  #   NOTE: OpenELIS serves from root (/), not a context path. The nginx block
  #   at /openelis/ strips the prefix and works for API/FHIR calls, but the
  #   HTML UI will have broken links when accessed via /openelis/. Use port
  #   8082 directly for UI access.
  #
  openelis:
    image: itechuw/openelis-global-2:latest
    depends_on:
      openelis-db:
        condition: service_healthy
    environment:
      DEFAULT_PW: "adminADMIN!"
      OE_DB_PASSWORD: "clinlims"
      CATALINA_OPTS: >-
        -Ddatasource.url=jdbc:postgresql://openelis-db:5432/clinlims
        -Ddatasource.username=clinlims
        -Ddatasource.password=clinlims
    volumes:
      - ./infra/openelis/common.properties:/run/secrets/common.properties:ro
      - ./infra/openelis/server.xml:/usr/local/tomcat/conf/server.xml:ro
      - openelis-lucene:/opt/tomcat/lucene/index
    ports:
      - "8082:8080"
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/fhir/R4/metadata"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  # ── Phase 3: Odoo 17 Community ───────────────────────────────────────────────
  #
  # odoo-db: Dedicated PostgreSQL for Odoo.
  #   The user must have CREATEDB rights so Odoo can create its own database.
  #   POSTGRES_DB=postgres is intentional — Odoo creates its app database via
  #   the web UI (or -d flag); we don't pre-create it.
  #
  odoo-db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-pg:/var/lib/postgresql/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # odoo: Odoo 17 Community Edition.
  #   First boot shows the "Create Database" page — create a DB named "odoo"
  #   with master password "admin" and install: Sale, Inventory, Accounting.
  #   UI:       http://localhost:8069/
  #   XML-RPC:  http://localhost:8069/xmlrpc/2/
  #   REST:     http://localhost:8069/api/          (Odoo 17+)
  #   Default master password: admin  (set in infra/odoo/odoo.conf)
  #
  odoo:
    image: odoo:17.0
    depends_on:
      odoo-db:
        condition: service_healthy
    environment:
      HOST: odoo-db
      PORT: 5432
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-data:/var/lib/odoo
      - ./infra/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
    ports:
      - "8069:8069"
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Phase 4: Integration Hub ──────────────────────────────────────────────────
  #
  # integration-hub: Thin FastAPI service that wires OpenMRS, OpenELIS, and Odoo.
  #   Runs a background poller (POLL_INTERVAL_S) that:
  #     • Syncs patients OpenMRS → OpenELIS (FHIR Patient)
  #     • Routes lab orders OpenMRS → OpenELIS (FHIR ServiceRequest)
  #     • Routes completed results OpenELIS → OpenMRS (FHIR DiagnosticReport)
  #     • Routes pharmacy orders OpenMRS → Odoo (XML-RPC sale.order)
  #   Health: http://localhost/integration-hub/api/health
  #   Status: http://localhost/integration-hub/api/atomfeed/status
  #
  integration-hub:
    build: ./services/integration-hub
    environment:
      ROOT_PATH: /integration-hub
      OPENMRS_URL: http://openmrs:8080
      OPENMRS_USER: admin
      OPENMRS_PASS: Admin123
      OPENELIS_URL: http://openelis:8080
      OPENELIS_USER: admin
      OPENELIS_PASS: "adminADMIN!"
      ODOO_URL: http://odoo:8069
      ODOO_DB: odoo
      ODOO_USER: admin
      ODOO_PASS: admin
      POLL_INTERVAL_S: "60"
      AUDIT_DB_PATH: /data/hub-audit.db
    volumes:
      - hub-audit:/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: orthanc
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 10s
      timeout: 5s
      retries: 5

  orthanc:
    image: orthancteam/orthanc
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORTHANC__POSTGRESQL__HOST: postgres
      ORTHANC__POSTGRESQL__DATABASE: orthanc
      ORTHANC__POSTGRESQL__USERNAME: orthanc
      ORTHANC__POSTGRESQL__PASSWORD: orthanc
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__PYTHON_SCRIPT: /etc/orthanc/plugin.py
      AI_CONTROLLER_URL: http://ai-controller:8000
      FHIR_BRIDGE_URL: http://integration-hub:8012
    volumes:
      - ./infra/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./infra/orthanc/plugin.py:/etc/orthanc/plugin.py:ro
      - orthanc-data:/var/lib/orthanc/db
    ports:
      - "4242:4242"
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8042/system')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ohif:
    image: ohif/app:latest
    volumes:
      - ./infra/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    networks: [openhis-net]
    restart: unless-stopped

  simulator:
    build: ./services/simulator
    environment:
      ORTHANC_URL: http://orthanc:8042
      ROOT_PATH: /simulator
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  ris:
    build: ./services/ris
    environment:
      DB_PATH: /data/ris.db
      ORTHANC_URL: http://orthanc:8042
      FHIR_BRIDGE_URL: http://integration-hub:8012
      ROOT_PATH: /ris
      OPENMRS_URL: http://openmrs:8080
      OPENMRS_USER: admin
      OPENMRS_PASS: Admin123
      POLL_INTERVAL_S: "60"
    volumes:
      - ris-data:/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-controller:
    build: ./services/ai-controller
    environment:
      ORTHANC_URL: http://orthanc:8042
      RIS_URL: http://ris:8002/api
      DB_PATH: /data/ai-controller.db
      JOBS_DATA_DIR: /data/jobs
      JOBS_VOLUME_NAME: openhis_ai-jobs
      DOCKER_NETWORK: openhis_openhis-net
      POC_XRAY_IMAGE: openhis/poc-xray:latest
      POC_CT_IMAGE: openhis/poc-ct:latest
      FHIR_BRIDGE_URL: http://integration-hub:8012
    volumes:
      - ai-jobs:/data/jobs
      - /var/run/docker.sock:/var/run/docker.sock
      - ai-controller-db:/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  poc-xray-pipeline:
    build: ./pipelines/poc-xray
    image: openhis/poc-xray:latest
    restart: "no"
    command: ["true"]
    networks: [openhis-net]

  poc-ct-pipeline:
    build: ./pipelines/poc-ct
    image: openhis/poc-ct:latest
    restart: "no"
    command: ["true"]
    networks: [openhis-net]

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ohif/ai-panel.html:/usr/share/nginx/html/ai-panel.html:ro
      - ./infra/portal/index.html:/usr/share/nginx/html/index.html:ro
    depends_on: [orthanc, ohif, simulator, ris, ai-controller, openmrs-frontend]
    networks: [openhis-net]
    restart: unless-stopped

  analytics:
    build: ./services/analytics
    container_name: openhis-analytics
    restart: unless-stopped
    environment:
      - DB_PATH=/data/analytics.db
      - OPENMRS_URL=http://openmrs:8080
      - OPENMRS_USER=admin
      - OPENMRS_PASS=Admin123
      - OPENELIS_URL=http://openelis:8080
      - OPENELIS_USER=admin
      - OPENELIS_PASS=adminADMIN!
      - RIS_URL=http://ris:8002/api
      - AI_CONTROLLER_URL=http://ai-controller:8000/api
      - ROOT_PATH=/analytics
      - COLLECT_INTERVAL_MIN=5
    volumes:
      - analytics-data:/data
    networks:
      - openhis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  hl7:
    build: ./services/hl7
    container_name: openhis-hl7
    restart: unless-stopped
    environment:
      - DB_PATH=/data/hl7.db
      - OPENMRS_URL=http://openmrs:8080
      - OPENMRS_USER=admin
      - OPENMRS_PASS=Admin123
      - ROOT_PATH=/hl7
      - MLLP_ENABLED=true
      - MLLP_HOST=0.0.0.0
      - MLLP_PORT=2575
    volumes:
      - hl7-data:/data
    ports:
      - "2575:2575"
    networks:
      - openhis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  patient-portal:
    build: ./services/patient-portal
    container_name: openhis-patient-portal
    restart: unless-stopped
    environment:
      - DB_PATH=/data/portal.db
      - OPENMRS_URL=http://openmrs:8080
      - OPENMRS_USER=admin
      - OPENMRS_PASS=Admin123
      - OPENELIS_URL=http://openelis:8080
      - OPENELIS_USER=admin
      - OPENELIS_PASS=adminADMIN!
      - RIS_URL=http://ris:8002/api
      - ROOT_PATH=/patient-portal
      - SESSION_TTL_HOURS=24
    volumes:
      - portal-sessions:/data
    networks:
      - openhis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
