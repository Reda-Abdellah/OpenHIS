version: "3.9"

networks:
  pacs-net:
    driver: bridge

volumes:
  pg-data:
  orthanc-data:
  ris-data:

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: orthanc
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - pacs-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 10s
      timeout: 5s
      retries: 5

  orthanc:
    image: orthancteam/orthanc
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORTHANC__POSTGRESQL__HOST: postgres
      ORTHANC__POSTGRESQL__DATABASE: orthanc
      ORTHANC__POSTGRESQL__USERNAME: orthanc
      ORTHANC__POSTGRESQL__PASSWORD: orthanc
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__PYTHON_SCRIPT: /etc/orthanc/plugin.py
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./orthanc/plugin.py:/etc/orthanc/plugin.py:ro
      - orthanc-data:/var/lib/orthanc/db
    ports:
      - "4242:4242"
    networks:
      - pacs-net
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    networks:
      - pacs-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  simulator:
    build: ./simulator
    environment:
      ORTHANC_URL: http://orthanc:8042
    networks:
      - pacs-net
    restart: unless-stopped

  ris:
    build: ./ris
    environment:
      DB_PATH: /data/ris.db
      ORTHANC_URL: http://orthanc:8042
    volumes:
      - ris-data:/data
    networks:
      - pacs-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  ohif:
    image: ohif/app:v3.9.2
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    networks:
      - pacs-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ohif/ai-panel.html:/usr/share/nginx/html/ai-panel.html:ro
    depends_on:
      - orthanc
      - ohif
      - ai-service
      - simulator
      - ris
    networks:
      - pacs-net
    restart: unless-stopped
