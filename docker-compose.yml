name: openhis

networks:
  openhis-net:
    driver: bridge



volumes:
  admin-data:
  pg-data:
  orthanc-data:
  ris-data:
  ai-jobs:
  ai-controller-db:
  ehr-data:
  lis-data:
  pharmacy_data:
  mpi_data:
  analytics-data:
  hl7-data:
  portal-sessions:

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: orthanc
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 10s
      timeout: 5s
      retries: 5

  orthanc:
    image: orthancteam/orthanc
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORTHANC__POSTGRESQL__HOST: postgres
      ORTHANC__POSTGRESQL__DATABASE: orthanc
      ORTHANC__POSTGRESQL__USERNAME: orthanc
      ORTHANC__POSTGRESQL__PASSWORD: orthanc
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__PYTHON_SCRIPT: /etc/orthanc/plugin.py
      AI_CONTROLLER_URL: http://ai-controller:8000
      FHIR_BRIDGE_URL: http://fhir-bridge:8005
    volumes:
      - ./infra/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./infra/orthanc/plugin.py:/etc/orthanc/plugin.py:ro
      - orthanc-data:/var/lib/orthanc/db
    ports:
      - "4242:4242"
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8042/system"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ohif:
    image: ohif/app:latest
    volumes:
      - ./infra/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    networks: [openhis-net]
    restart: unless-stopped

  simulator:
    build: ./services/simulator
    environment:
      ORTHANC_URL: http://orthanc:8042
      ROOT_PATH: /simulator
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  ris:
    build: ./services/ris
    environment:
      DB_PATH: /data/ris.db
      ORTHANC_URL: http://orthanc:8042
      FHIR_BRIDGE_URL: http://fhir-bridge:8005
      ROOT_PATH: /ris
    volumes:
      - ris-data:/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-controller:
    build: ./services/ai-controller
    environment:
      ORTHANC_URL: http://orthanc:8042
      RIS_URL: http://ris:8002/api
      DB_PATH: /data/ai-controller.db
      JOBS_DATA_DIR: /data/jobs
      JOBS_VOLUME_NAME: openhis_ai-jobs
      DOCKER_NETWORK: openhis_openhis-net
      POC_XRAY_IMAGE: openhis/poc-xray:latest
      POC_CT_IMAGE: openhis/poc-ct:latest
      FHIR_BRIDGE_URL: http://fhir-bridge:8005
    volumes:
      - ai-jobs:/data/jobs
      - /var/run/docker.sock:/var/run/docker.sock
      - ai-controller-db:/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  poc-xray-pipeline:
    build: ./pipelines/poc-xray
    image: openhis/poc-xray:latest
    restart: "no"
    command: ["true"]
    networks: [openhis-net]

  poc-ct-pipeline:
    build: ./pipelines/poc-ct
    image: openhis/poc-ct:latest
    restart: "no"
    command: ["true"]
    networks: [openhis-net]

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ohif/ai-panel.html:/usr/share/nginx/html/ai-panel.html:ro
      - ./infra/portal/index.html:/usr/share/nginx/html/index.html:ro
    depends_on: [orthanc, ohif, simulator, ris, ai-controller]
    networks: [openhis-net]
    restart: unless-stopped

  ehr:
    build: ./services/ehr
    environment:
      DB_PATH: /data/ehr.db
      FHIR_BRIDGE_URL: http://fhir-bridge:8005
      RIS_URL: http://ris:8002/api
      LIS_URL: http://lis:8004/api
      ROOT_PATH: /ehr
    volumes:
      - ehr-data:/data
    networks:
      - openhis-net
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:8003/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  lis:
    build: ./services/lis
    environment:
      DB_PATH: /data/lis.db
      EHR_URL: http://ehr:8003/api
      FHIR_BRIDGE_URL: http://fhir-bridge:8005
      ROOT_PATH: /lis
    volumes:
      - lis-data:/data
    networks:
      - openhis-net
    restart: unless-stopped
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:8004/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  fhir-bridge:
    build: ./services/fhir-bridge
    environment:
      EHR_URL: http://ehr:8003/api
      RIS_URL: http://ris:8002/api
      LIS_URL: http://lis:8004/api
      ORTHANC_URL: http://orthanc:8042
      AI_CONTROLLER_URL: http://ai-controller:8000/api
      FHIR_SERVER_URL: http://fhir-server:8080/fhir    # set empty to disable
      FHIR_ENABLED: "true"
    networks:
      - openhis-net
    restart: unless-stopped
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:8005/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  pharmacy:
    build: ./services/pharmacy
    container_name: openhis-pharmacy
    restart: unless-stopped
    environment:
      - DB_PATH=/data/pharmacy.db
      - EHR_URL=http://ehr:8003/api
      - FHIR_BRIDGE_URL=http://fhir-bridge:8005
      - ROOT_PATH=/pharmacy
    volumes:
      - pharmacy_data:/data
    depends_on:
      - ehr
    networks:
      - openhis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  fhir-server:
    image: hapiproject/hapi:latest
    volumes:
      - ./infra/fhir/application.yaml:/data/hapi/application.yaml:ro
    environment:
      SPRING_CONFIG_LOCATION: file:///data/hapi/application.yaml
    networks:
      - openhis-net
    restart: unless-stopped
    depends_on:
      - postgres
    profiles:
      - fhir    # opt-in: docker compose --profile fhir up -d

  mpi:
    build: ./services/mpi
    container_name: openhis-mpi
    restart: unless-stopped
    environment:
      - DB_PATH=/data/mpi.db
      - ROOT_PATH=/mpi
    volumes:
      - mpi_data:/data
    networks:
      - openhis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  analytics:
    build: ./services/analytics
    container_name: openhis-analytics
    restart: unless-stopped
    environment:
      - DB_PATH=/data/analytics.db
      - EHR_URL=http://ehr:8003/api
      - LIS_URL=http://lis:8004/api
      - RIS_URL=http://ris:8002/api
      - AI_CONTROLLER_URL=http://ai-controller:8000/api
      - MPI_URL=http://mpi:8007/api
      - ROOT_PATH=/analytics
      - COLLECT_INTERVAL_MIN=5
    volumes:
      - analytics-data:/data
    networks:
      - openhis-net
    depends_on:
      - ehr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  hl7:
    build: ./services/hl7
    container_name: openhis-hl7
    restart: unless-stopped
    environment:
      - DB_PATH=/data/hl7.db
      - EHR_URL=http://ehr:8003/api
      - MPI_URL=http://mpi:8007/api
      - ROOT_PATH=/hl7
      - MLLP_ENABLED=true
      - MLLP_HOST=0.0.0.0
      - MLLP_PORT=2575
    volumes:
      - hl7-data:/data
    ports:
      - "2575:2575"
    networks:
      - openhis-net
    depends_on:
      - ehr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  patient-portal:
    build: ./services/patient-portal
    container_name: openhis-patient-portal
    restart: unless-stopped
    environment:
      - DB_PATH=/data/portal.db
      - EHR_URL=http://ehr:8003/api
      - RIS_URL=http://ris:8002/api
      - ROOT_PATH=/patient-portal
      - SESSION_TTL_HOURS=24
    volumes:
      - portal-sessions:/data
    networks:
      - openhis-net
    depends_on:
      - ehr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin:
    build: ./services/admin
    container_name: openhis-admin
    restart: unless-stopped
    environment:
      - DB_PATH=/data/admin.db
      - ROOT_PATH=/admin
      - SESSION_TTL_HOURS=12
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - EHR_HEALTH=http://ehr:8003/api/health
      - RIS_HEALTH=http://ris:8002/api/health
      - AI_HEALTH=http://ai-controller:8000/api/health
      - FHIR_HEALTH=http://fhir-bridge:8005/api/health
      - MPI_HEALTH=http://mpi:8007/api/health
      - HL7_HEALTH=http://hl7:8009/api/health
      - PP_HEALTH=http://patient-portal:8010/api/health
      - AN_HEALTH=http://analytics:8008/api/health
      - PACS_HEALTH=http://orthanc:8042/system
    volumes:
      - admin-data:/data
    networks:
      - openhis-net
    depends_on:
      - ehr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
