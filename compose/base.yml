name: openhis

# ── Base compose file ─────────────────────────────────────────────────────────
# Always-on services: infrastructure + management plane + core integration.
# All profile files (-f compose/profiles/*.yml) extend this file.
#
# Relative paths use ../ to resolve from OpenHIS project root.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  openhis-net:
    driver: bridge

volumes:
  pg-data:
  admin-data:
  hl7-data:
  hub-audit:
  redis-data:

services:

  # ── Redis event bus ────────────────────────────────────────────────────────
  # Backs the openhis:events stream consumed by MPI, Analytics, and HL7.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - ../infra/redis/redis.conf:/etc/redis/redis.conf:ro
      - redis-data:/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Shared PostgreSQL ───────────────────────────────────────────────────────
  # Hosts the Orthanc database today. Future phases add admin + mpi schemas here.
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orthanc}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orthanc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Admin management plane ─────────────────────────────────────────────────
  # FastAPI service: users, config, service health, audit log, announcements.
  # UI:      http://localhost/admin/
  # Health:  http://localhost/admin/api/health
  # Default credentials: admin / admin123 (override with ADMIN_USER / ADMIN_PASS)
  admin:
    build:
      context: ${PWD}
      dockerfile: services/admin/Dockerfile
    environment:
      ROOT_PATH: /admin
      DB_PATH: /data/admin.db
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}
      KEYCLOAK_SPA_CLIENT_ID: ${KEYCLOAK_SPA_CLIENT_ID:-openhis-admin-spa}
      KEYCLOAK_URL: http://keycloak:8080/keycloak
      KEYCLOAK_REALM: openhis
      KEYCLOAK_CLIENT_ID: openhis-platform
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-openhis-platform-secret}
      REDIS_URL: redis://redis:6379
    volumes:
      - admin-data:/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Master Patient Index ───────────────────────────────────────────────────
  # Cross-reference registry that links patient identities across all apps.
  # UI:      http://localhost/mpi/
  # Health:  http://localhost/mpi/api/health
  mpi:
    build:
      context: ${PWD}
      dockerfile: services/mpi/Dockerfile
    environment:
      ROOT_PATH: /mpi
      MPI_DATABASE_URL: postgresql://mpi:${MPI_DB_PASS:-mpi}@postgres:5432/mpi
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080/keycloak
      KEYCLOAK_REALM: openhis
      KEYCLOAK_CLIENT_ID: openhis-platform
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}
      KEYCLOAK_SPA_CLIENT_ID: ${KEYCLOAK_SPA_CLIENT_ID:-openhis-admin-spa}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Integration Hub ────────────────────────────────────────────────────────
  # Polls and syncs: OpenMRS ↔ OpenELIS (patients, lab orders, results),
  # OpenMRS → Odoo (pharmacy orders). Background worker with retry queue.
  # Health:  http://localhost/integration-hub/api/health
  integration-hub:
    build:
      context: ${PWD}
      dockerfile: services/integration-hub/Dockerfile
    environment:
      ROOT_PATH: /integration-hub
      OPENMRS_URL: http://openmrs:8080
      OPENELIS_URL: http://openelis:8080
      OPENELIS_USER: ${OPENELIS_USER:-admin}
      OPENELIS_PASSWORD: ${OPENELIS_PASSWORD:-adminADMIN!}
      ODOO_URL: http://odoo:8069
      ODOO_DB: odoo
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/keycloak/realms/openhis/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: integration-hub-sa
      KEYCLOAK_CLIENT_SECRET: ${INTEGRATION_HUB_KC_CLIENT_SECRET:-integration-hub-sa-secret}
      ODOO_ADMIN_PASS: ${ODOO_ADMIN_PASS:-admin}
      POLL_INTERVAL_S: "60"
      AUDIT_DB_PATH: /data/hub-audit.db
      REDIS_URL: redis://redis:6379
      MPI_URL: http://mpi:8007
    volumes:
      - hub-audit:/data
      - ../services/admin/openhis.service.json:/app/manifests/admin.json:ro
      - ../services/mpi/openhis.service.json:/app/manifests/mpi.json:ro
      - ../services/integration-hub/openhis.service.json:/app/manifests/integration-hub.json:ro
      - ../services/hl7/openhis.service.json:/app/manifests/hl7.json:ro
      - ../services/analytics/openhis.service.json:/app/manifests/analytics.json:ro
      - ../services/ai-controller/openhis.service.json:/app/manifests/ai-controller.json:ro
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── HL7 Gateway ────────────────────────────────────────────────────────────
  # Accepts and emits HL7 v2 messages (ADT, ORU, ORM) via MLLP on port 2575.
  # Health:  http://localhost/hl7/api/health
  hl7:
    build:
      context: ${PWD}
      dockerfile: services/hl7/Dockerfile
    environment:
      DB_PATH: /data/hl7.db
      OPENMRS_URL: http://openmrs:8080
      OPENELIS_URL: http://openelis:8080
      MPI_BASE_URL: http://mpi:8007
      REDIS_URL: redis://redis:6379
      ROOT_PATH: /hl7
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/keycloak/realms/openhis/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: hl7-sa
      KEYCLOAK_CLIENT_SECRET: ${HL7_KC_CLIENT_SECRET:-hl7-sa-secret}
      MLLP_ENABLED: "true"
      MLLP_HOST: "0.0.0.0"
      MLLP_PORT: "2575"
    volumes:
      - hl7-data:/data
    ports:
      - "2575:2575"
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Keycloak Identity Provider ────────────────────────────────────────────
  # Single sign-on for all native services (JWT Bearer tokens).
  # Admin console: http://localhost/keycloak/
  # OIDC discovery: http://keycloak:8080/realms/openhis/.well-known/openid-configuration
  # Default admin credentials: admin / admin  (change in production!)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_RELATIVE_PATH: /keycloak
      KC_HOSTNAME_URL: http://localhost/keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_PROXY: edge
    volumes:
      - ../infra/keycloak/openhis-realm.json:/opt/keycloak/data/import/openhis-realm.json:ro
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/true"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  # Single entry point on port 80. Routes to all active profile services.
  # Services not in the active profile return 502 — this is expected.
  nginx:
    build:
      context: ${PWD}/infra/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infra/nginx/njs:/etc/nginx/njs:ro
      - ../infra/ohif/ai-panel.html:/usr/share/nginx/html/ai-panel.html:ro
      - ../infra/portal/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      admin:
        condition: service_healthy
      mpi:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: [openhis-net]
    restart: unless-stopped
