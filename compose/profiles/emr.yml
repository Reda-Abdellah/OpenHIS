# ── EMR Profile ───────────────────────────────────────────────────────────────
# OpenMRS O3 — Electronic Medical Record
# Includes: MySQL database, OpenMRS Tomcat backend, O3 React SPA frontend.
#
# Enable: OPENHIS_PROFILES=emr make up
# Routes: /openmrs/ → backend, /openmrs/spa/ → frontend
# Default credentials: admin / Admin123
#
# First boot runs Liquibase migrations — expect 10–15 min before healthy.
# ─────────────────────────────────────────────────────────────────────────────
x-openhis:
  profile: emr
  display_name: "Electronic Medical Record (OpenMRS O3)"
  requires: [base]
  integrates_with: [laboratory, erp, imaging]
  nginx_routes:
    - { path: /openmrs/spa/, upstream: "openmrs-frontend:80" }
    - { path: /openmrs/,     upstream: "openmrs:8080" }

networks:
  openhis-net:
    driver: bridge

volumes:
  openmrs-mysql:
  openmrs-data:

services:

  openmrs-db:
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --lower_case_table_names=1
      --log_bin_trust_function_creators=1
    environment:
      # Dev defaults apply when the env vars are unset — override in .env
      # before any real deployment (see .env.example, EMR profile section).
      MYSQL_ROOT_PASSWORD: ${OPENMRS_DB_ROOT_PASSWORD:-openmrs_root}
      MYSQL_DATABASE: openmrs
      MYSQL_USER: openmrs
      MYSQL_PASSWORD: ${OPENMRS_DB_PASSWORD:-openmrs}
    volumes:
      - openmrs-mysql:/var/lib/mysql
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${OPENMRS_DB_ROOT_PASSWORD:-openmrs_root}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  openmrs:
    image: openmrs/openmrs-reference-application-3-backend:nightly
    depends_on:
      openmrs-db:
        condition: service_healthy
    environment:
      OMRS_DB_HOSTNAME: openmrs-db
      OMRS_DB_PORT: 3306
      OMRS_DB_NAME: openmrs
      OMRS_DB_USERNAME: openmrs
      # Must match openmrs-db MYSQL_PASSWORD — same env var drives both.
      OMRS_DB_PASSWORD: ${OPENMRS_DB_PASSWORD:-openmrs}
      KEYCLOAK_URL: http://keycloak:8080/keycloak
      OMRS_CREATE_TABLES: "true"
      OMRS_AUTO_UPDATE_DATABASE: "true"
      OMRS_ADMIN_USER_PASSWORD: ${OPENMRS_PASSWORD:-Admin123}
    volumes:
      - openmrs-data:/openmrs/data
      - ../infra/openmrs/modules/oauth2login-1.5.0.omod:/openmrs/data/modules/oauth2login-1.5.0.omod:ro
      # Mask out the authentication module shipped by the base image — it conflicts
      # with oauth2login (dual-registration causes DaemonToken null bug).
      # An empty file prevents the entrypoint from loading the real module.
      - ../infra/openmrs/modules/authentication-2.2.0.omod.disabled:/openmrs/distribution/openmrs_modules/authentication-2.2.0.omod:ro
      - ../infra/openmrs/oauth2.properties:/openmrs/data/oauth2.properties:ro
      - ../infra/openmrs/openmrs-runtime.properties:/openmrs/data/openmrs-runtime.properties:ro
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/openmrs/health/started"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  openmrs-frontend:
    image: openmrs/openmrs-reference-application-3-frontend:nightly
    volumes:
      - ../infra/openmrs/spa-config.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      openmrs:
        condition: service_healthy
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/config.json
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/openmrs/spa/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
