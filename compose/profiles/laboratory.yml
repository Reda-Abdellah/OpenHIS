# ── Laboratory Profile ────────────────────────────────────────────────────────
# OpenELIS Global 2 — Laboratory Information System
# Includes: PostgreSQL database (pre-seeded), OpenELIS Tomcat webapp.
#
# Enable: OPENHIS_PROFILES=laboratory make up
# Routes: /OpenELIS-Global/ → UI+REST, /openelis-fhir/ → FHIR R4
# Default credentials: admin / adminADMIN!
#
# NOTE: OpenELIS UI has broken links when accessed via /OpenELIS-Global/ nginx
# path. Use port 8082 directly for full UI. API and FHIR calls work via nginx.
#
# First boot loads OpenELIS-Global.sql then runs Liquibase — expect 3–5 min.
# ─────────────────────────────────────────────────────────────────────────────
x-openhis:
  profile: laboratory
  display_name: "Laboratory Information System (OpenELIS Global 2)"
  requires: [base]
  integrates_with: [emr]
  nginx_routes:
    - { path: /OpenELIS-Global/, upstream: "openelis:8080" }
    - { path: /openelis-fhir/,   upstream: "openelis:8080" }
    - { path: /oe-fhir-store/,   upstream: "oe-fhir-store:8080" }

networks:
  openhis-net:
    driver: bridge

volumes:
  openelis-pg:
  openelis-lucene:

services:

  # ── OpenELIS backing FHIR store — HAPI FHIR JPA Server (DEF-012) ────────
  # OpenELIS Global 2's FHIR module is a façade over an external FHIR
  # store: every /fhir search and write is forwarded to
  # org.openelisglobal.fhirstore.uri (see infra/openelis/
  # extra.properties.j2). Without this server every Patient search 500s.
  #
  # OE addresses it through nginx (http://localhost/oe-fhir-store/fhir)
  # because its JVM resolves only `localhost` (jdk.net.hosts.file →
  # host-gateway); the nginx route is subnet-restricted.
  #
  # In-memory H2: the store holds FHIR *projections* of clinlims data —
  # the OpenELIS Postgres remains the system of record. For deployments
  # that must survive restarts, switch to a Postgres-backed HAPI.
  # ─────────────────────────────────────────────────────────────────────────
  oe-fhir-store:
    image: hapiproject/hapi:v8.6.5-1
    environment:
      hapi.fhir.fhir_version: R4
      # Publish the public URL (via nginx) so OE can follow
      # CapabilityStatement/Bundle "link" hrefs it cannot resolve by
      # container hostname.
      hapi.fhir.server_address: http://localhost/oe-fhir-store/fhir
      spring.datasource.url: "jdbc:h2:mem:hapi-oe;DB_CLOSE_DELAY=-1"
      spring.datasource.driver-class-name: org.h2.Driver
      # OE writes resources that reference entities living only in
      # clinlims — don't reject them.
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.enforce_referential_integrity_on_write: "false"
      hapi.fhir.enforce_referential_integrity_on_delete: "false"
      hapi.fhir.allow_multiple_delete: "true"
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/fhir/metadata >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  openelis-db:
    image: itechuw/openelis-global-2-database:latest
    environment:
      # POSTGRES_USER must be a superuser — the image's init.sh creates the
      # clinlims and admin users internally from DB_PASSWORD /
      # DB_SUPERUSER_PASSWORD and loads OpenELIS-Global.sql (base schema).
      # Dev defaults apply when unset — override in .env before deploy
      # (see .env.example, Laboratory profile section).
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${OPENELIS_PG_PASSWORD:-postgres}
      POSTGRES_DB: clinlims
      DB_PASSWORD: ${OPENELIS_DB_PASSWORD:-clinlims}
      DB_SUPERUSER_PASSWORD: ${OPENELIS_DB_SUPERUSER_PASSWORD:-clinlims_super}
    volumes:
      - openelis-pg:/var/lib/postgresql/data
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinlims"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  openelis:
    image: itechuw/openelis-global-2:latest
    depends_on:
      openelis-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      # FHIR hooks register against the backing store at context init.
      oe-fhir-store:
        condition: service_healthy
    extra_hosts:
      - "localhost:host-gateway"
    entrypoint: ["/entrypoint-wrapper.sh"]
    environment:
      # OPENELIS_PASSWORD is the same var the integration-hub uses in
      # base.yml — one var drives every consumer of the OE admin account.
      # OPENELIS_DB_PASSWORD must match openelis-db's DB_PASSWORD above.
      DEFAULT_PW: "${OPENELIS_PASSWORD:-adminADMIN!}"
      OE_DB_PASSWORD: "${OPENELIS_DB_PASSWORD:-clinlims}"
      CATALINA_OPTS: >-
        -Ddatasource.url=jdbc:postgresql://openelis-db:5432/clinlims
        -Ddatasource.username=clinlims
        -Ddatasource.password=${OPENELIS_DB_PASSWORD:-clinlims}
    volumes:
      - ../infra/openelis/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
      - ../infra/openelis/common.properties:/run/secrets/common.properties:ro
      - ../infra/openelis/extra.properties:/run/secrets/extra.properties:ro
      - ../infra/openelis/server.xml:/usr/local/tomcat/conf/server.xml:ro
      - ../infra/openelis/ssl/lf.keystore:/ssl/lf.keystore:ro
      - ../infra/openelis/ssl/lf.truststore:/ssl/lf.truststore:ro
      - ../infra/openelis/odoo-test-product-mapping.csv:/var/lib/openelis-global/odoo/odoo-test-product-mapping.csv:ro
      - ../infra/openelis/CustomFormAuthenticationSuccessHandler.class:/opt/patches/CustomFormAuthenticationSuccessHandler.class:ro
      - ../infra/openelis/CustomSSOAuthenticationSuccessHandler.class:/opt/patches/CustomSSOAuthenticationSuccessHandler.class:ro
      - ../infra/openelis/web.xml:/opt/patches/web.xml:ro
      - ../infra/openelis/Catalina/localhost/OpenELIS-Global.xml:/usr/local/tomcat/conf/Catalina/localhost/OpenELIS-Global.xml:ro
      - openelis-lucene:/opt/tomcat/lucene/index
    ports:
      - "8082:8080"
    networks: [openhis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf",
             "http://127.0.0.1:8080/OpenELIS-Global/LoginPage"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
