events { worker_connections 1024; }

http {
    upstream orthanc      { server orthanc:8042; }
    upstream ohif         { server ohif:80; }
    upstream ris          { server ris:8002; }
    upstream aicontroller { server ai-controller:8000; }
    upstream simulator    { server simulator:8001; }
    upstream ehr          { server ehr:8003; }
    upstream lis          { server lis:8004; }
    upstream fhirbridge   { server fhir-bridge:8005; }

    server {
        listen 80;
        client_max_body_size 0;

        # ── Portal entry point ─────────────────────────────
        location = / {
            root  /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # ── Orthanc PACS ───────────────────────────────────
        location = /orthanc { return 301 /orthanc/; }
        location /orthanc/ {
            proxy_pass             http://orthanc/;
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_request_buffering off;
            proxy_buffering        off;
            proxy_read_timeout     300s;
        }

        # ── RIS ────────────────────────────────────────────
        location = /ris { return 301 /ris/; }
        location /ris/ {
            proxy_pass             http://ris/;
            proxy_set_header       Host $host;
        }

        # ── AI Controller ──────────────────────────────────
        location = /ai-controller { return 301 /ai-controller/; }
        location /ai-controller/ {
            proxy_pass             http://aicontroller/;
            proxy_set_header       Host $host;
        }

        # ── DICOM Simulator ────────────────────────────────
        location = /simulator { return 301 /simulator/; }
        location /simulator/ {
            proxy_pass             http://simulator/;
            proxy_set_header       Host $host;
        }

        # ── EHR ────────────────────────────────────────────
        location = /ehr { return 301 /ehr/; }
        location /ehr/ {
            proxy_pass             http://ehr/;
            proxy_set_header       Host $host;
        }

        # ── LIS ────────────────────────────────────────────
        location = /lis { return 301 /lis/; }
        location /lis/ {
            proxy_pass             http://lis/;
            proxy_set_header       Host $host;
        }

        # ── FHIR Bridge ────────────────────────────────────
        location = /fhir-bridge { return 301 /fhir-bridge/; }
        location /fhir-bridge/ {
            proxy_pass             http://fhirbridge/;
            proxy_set_header       Host $host;
        }

        # ── OHIF Viewer at /ohif/ ──────────────────────────
        location = /ohif { return 301 /ohif/; }
        location /ohif/ {
            proxy_pass             http://ohif/;
            proxy_set_header       Host $host;
        }

        # ── Catch-all: OHIF webpack assets (/static/, etc.) 
        location / {
            proxy_pass             http://ohif;
            proxy_set_header       Host $host;
        }
    }
}
