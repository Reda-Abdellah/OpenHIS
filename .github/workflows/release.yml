name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"  # matches v0.1.0, v1.2.3-alpha, etc.

jobs:
  # ── Build & push Docker images to GHCR ──────────────────────────────────────
  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - mpi
          - hl7
          - analytics
          - ai-controller
          - ris
          - patient-portal
          - admin
          - integration-hub

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openhis-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Publish openhis-opm to PyPI ─────────────────────────────────────────────
  # Uses PyPI Trusted Publishing (OIDC) — configure the publisher once on
  # pypi.org (project: openhis-opm, workflow: release.yml, environment:
  # pypi) before the first tag. continue-on-error keeps the rest of the
  # release flowing until that one-time setup is done.
  publish-pypi:
    name: Publish openhis-opm to PyPI
    runs-on: ubuntu-latest
    continue-on-error: true
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build platform/ --outdir dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── Create GitHub Release with the released section's notes ─────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish-images
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract this release's CHANGELOG section
        # First versioned section (skipping [Unreleased]) up to the next one.
        run: |
          awk '/^## \[/ && !/Unreleased/ {n++} n==1' CHANGELOG.md > RELEASE_NOTES.md
          head -8 RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: false
