name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── SDK drift guard ─────────────────────────────────────────────────────────
  # Fails if any service contains a full copy of jwt_auth or log_config
  # instead of the thin re-export from openhis_sdk.
  sdk-lint:
    name: SDK Drift Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no full jwt_auth copies outside libs/
        run: |
          found=$(grep -rl "class JWTMiddleware" services/ 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "ERROR: Full JWTMiddleware implementation found outside libs/:"
            echo "$found"
            exit 1
          fi

      - name: Check no full log_config copies outside libs/
        run: |
          found=$(grep -rl "def configure" services/ 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "ERROR: Full log configure implementation found outside libs/:"
            echo "$found"
            exit 1
          fi

      - name: Check no inline JWT validation logic outside libs/
        # Catches re-implementations that don't define JWTMiddleware
        # (e.g. dependency-only modules doing their own JWKS/jose decode).
        run: |
          found=$(grep -rlE "jose_jwt\.decode|_get_jwks" services/ --include='*.py' 2>/dev/null | grep -v '_legacy' || true)
          if [ -n "$found" ]; then
            echo "ERROR: Inline JWT validation logic found outside libs/:"
            echo "$found"
            exit 1
          fi

  # ── Unit tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mpi
          POSTGRES_PASSWORD: mpi
          POSTGRES_DB: mpi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mpi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('services/*/requirements.txt') }}
          restore-keys: pip-

      - name: Install all service dependencies
        run: |
          pip install pytest pytest-asyncio httpx respx
          # [dev] extra pulls fakeredis (tests/unit/sdk + bus regression tests)
          # and fhir.resources (tests/unit/integration-hub CapabilityStatement)
          pip install -e 'libs/openhis_sdk[dev]'
          pip install -e platform
          for req in services/*/requirements.txt; do
            pip install -r "$req"
          done

      # The MPI suite needs the Postgres sidecar (MPI_DATABASE_URL); without it
      # 74 DB-bound tests skip silently — see tests/unit/mpi/conftest.py (DEF-003).
      - name: Run unit suite
        env:
          MPI_DATABASE_URL: postgresql://mpi:mpi@localhost:5432/mpi_test
          REDIS_URL: redis://localhost:6379
          OPENMRS_USER: admin
          OPENMRS_PASS: test
          OPENELIS_USER: admin
          OPENELIS_PASS: test
          ODOO_USER: admin
          ODOO_PASS: test
          LOG_FORMAT: text
        run: pytest tests/unit -q --tb=short

      - name: Assert MPI DB-bound tests actually ran (no silent skips)
        env:
          MPI_DATABASE_URL: postgresql://mpi:mpi@localhost:5432/mpi_test
          LOG_FORMAT: text
        run: |
          skipped=$(pytest tests/unit/mpi -q -rs --tb=no | grep -c 'PostgreSQL not reachable' || true)
          if [ "$skipped" -gt 0 ]; then
            echo "ERROR: $skipped MPI tests skipped — Postgres sidecar misconfigured"
            exit 1
          fi

      - name: Run auth deny-by-default harness
        env:
          LOG_FORMAT: text
        run: pytest tests/auth -q --tb=short

      - name: Run MPI matching benchmark (regression floors)
        env:
          LOG_FORMAT: text
        run: pytest tests/benchmarks -q --tb=short

      - name: Run integration suite (respx mocks)
        env:
          REDIS_URL: redis://localhost:6379
          OPENMRS_USER: admin
          OPENMRS_PASS: test
          OPENELIS_USER: admin
          OPENELIS_PASS: test
          LOG_FORMAT: text
        run: pytest tests/integration -q --tb=short

  # ── Smoke tests ─────────────────────────────────────────────────────────────
  # Requires a full running stack; runs on push to main/master only.
  # Waits for all core service health endpoints to return 200.
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env && sed -i 's/CHANGE_ME_BEFORE_DEPLOY/test_ci_value/g' .env

      - name: Start base stack
        run: docker compose -f compose/base.yml up -d --wait --wait-timeout 120
        env:
          ADMIN_PASS: test_ci_value
          POSTGRES_PASSWORD: test_ci_value
          MPI_DB_PASS: test_ci_value
          KEYCLOAK_ADMIN_PASSWORD: test_ci_value
          KEYCLOAK_CLIENT_SECRET: test_ci_value

      - name: Set up Python for smoke tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke test deps
        run: pip install pytest httpx

      - name: Run smoke tests
        run: pytest tests/smoke/ -v -m smoke

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f compose/base.yml logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose -f compose/base.yml down -v

  # ── End-to-end V&V scenarios ────────────────────────────────────────────────
  # Executable mirror of docs/verification_and_validation/v-and-v-scenario.md.
  # Boots an ephemeral stack with the clinical profiles, then runs the 8
  # cross-service scenarios. Heavy (OpenMRS+OpenELIS first boot), so it only
  # runs on merge to main/master or on demand.
  e2e-tests:
    name: E2E V&V Scenarios
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    needs: unit-tests
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env && sed -i 's/CHANGE_ME_BEFORE_DEPLOY/test_ci_value/g' .env

      - name: Render infra templates (Keycloak realm, OpenELIS properties)
        # The rendered realm is gitignored (carries client secrets) — a
        # fresh checkout must render it or Keycloak imports nothing and
        # every OIDC login fails.
        run: |
          pip install jinja2 click requests pyyaml
          python platform/opm.py demo-render

      - name: Start stack with clinical profiles
        run: |
          OPENHIS_PROFILES=emr,laboratory,imaging,analytics \
          docker compose \
            -f compose/base.yml \
            -f compose/profiles/emr.yml \
            -f compose/profiles/laboratory.yml \
            -f compose/profiles/imaging.yml \
            -f compose/profiles/analytics.yml \
            up -d --wait --wait-timeout 900

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install e2e deps
        run: pip install pytest httpx

      - name: Run e2e scenarios
        run: pytest tests/e2e --e2e -v

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f compose/base.yml ps
          docker compose -f compose/base.yml logs --tail=80

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f compose/base.yml \
            -f compose/profiles/emr.yml \
            -f compose/profiles/laboratory.yml \
            -f compose/profiles/imaging.yml \
            -f compose/profiles/analytics.yml \
            down -v

  # ── Docker build check ──────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - mpi
          - hl7
          - analytics
          - ai-controller
          - ris
          - patient-portal
          - admin
          - integration-hub
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }}
        run: |
          docker build . \
            -f services/${{ matrix.service }}/Dockerfile \
            --tag openhis/${{ matrix.service }}:ci \
            --label "git-sha=${{ github.sha }}"
