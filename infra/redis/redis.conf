# OpenHIS Redis configuration
# Used as the platform event bus (Redis Streams) and optional cache.

# Persistence — append-only file ensures events survive container restarts
appendonly yes
appendfsync everysec

# Memory limit — increase for high-volume deployments
maxmemory 256mb
maxmemory-policy allkeys-lru

# Stream-specific: trim consumer group PEL entries older than 24 h
# (prevents unbounded memory growth from dead consumers)
# This is enforced by consumer code via XAUTOCLAIM, not server-side config.

# Logging
loglevel notice

# Disable protected-mode so Docker bridge network can reach Redis
protected-mode no

# Bind to all interfaces inside the container network
bind 0.0.0.0
