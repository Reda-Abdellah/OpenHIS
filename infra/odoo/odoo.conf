# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  ⚠️  SECURITY WARNING — CHANGE admin_passwd BEFORE ANY REAL DEPLOYMENT  ⚠️  ║
# ║                                                                           ║
# ║  admin_passwd is the Odoo MASTER password: it allows creating, cloning,  ║
# ║  backing up and DROPPING databases from the /web/database manager page.  ║
# ║  The dev default below ("admin") is publicly known. It must match the    ║
# ║  ODOO_MASTER_PASS value in your .env (used by the odoo-init container).  ║
# ║                                                                           ║
# ║  db_password is intentionally NOT set here: the official odoo image      ║
# ║  prefers odoo.conf values over environment variables, so the database    ║
# ║  password is driven by the PASSWORD env var in compose/profiles/erp.yml  ║
# ║  (${ODOO_DB_PASSWORD:-odoo}). Do not re-add db_password to this file.    ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
[options]
db_host = odoo-db
db_port = 5432
db_user = odoo
# Trust X-Forwarded-* headers when sitting behind nginx
proxy_mode = True
# Master password for the database management page — CHANGE BEFORE DEPLOY
admin_passwd = admin
