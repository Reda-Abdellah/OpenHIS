events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream orthanc       { server orthanc:8042; }
    upstream ohif          { server ohif:80; }
    upstream ris           { server ris:8002; }
    upstream aicontroller  { server ai-controller:8000; }
    upstream simulator     { server simulator:8001; }
    upstream analytics     { server analytics:8008; }
    upstream hl7           { server hl7:8009; }
    upstream patientportal { server patient-portal:8010; }

    # Phase 1 — OpenMRS O3
    upstream openmrs_be    { server openmrs:8080; }       # Tomcat / REST / FHIR
    upstream openmrs_fe    { server openmrs-frontend:80; } # SPA (React microfrontend)

    # Phase 2 — OpenELIS Global 2
    upstream openelis_be   { server openelis:8080; }       # Tomcat / FHIR R4 / REST

    # Phase 3 — Odoo 17
    upstream odoo_be       { server odoo:8069; }           # Odoo web + XML-RPC + REST

    # Phase 4 — Integration Hub
    upstream hub_be        { server integration-hub:8012; } # FastAPI poller

    server {
        listen 80;
        root /usr/share/nginx/html;

        # ── Portal entry point ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ @fallback;
        }

        location @fallback {
            rewrite ^.*$ /index.html last;
        }

        # OHIF assets with absolute paths - must come before fallback
        location ~ ^/(app-config\.js|init-service-worker\.js|app\.bundle.*|assets/|[0-9]+\.bundle\..*|[0-9]+\.css)$ {
            proxy_pass http://ohif;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ohif/ {
            proxy_pass         http://ohif/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /ohif;
        }

        # ── Module proxies ──────────────────────────────────────────────
        # Trailing slash on both location and proxy_pass is required so
        # nginx strips the prefix before forwarding to the upstream.

        location /ris/ {
            proxy_pass         http://ris/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /ris;
        }

        location /ai-controller/ {
            proxy_pass         http://aicontroller/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /ai-controller;
        }

        location /simulator/ {
            proxy_pass         http://simulator/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /simulator;
        }

        location /orthanc/ {
            proxy_pass         http://orthanc/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /orthanc;
        }

        location /analytics/ {
            proxy_pass         http://analytics/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /analytics;
        }

        location /hl7/ {
            proxy_pass         http://hl7/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /hl7;
        }

        location /patient-portal/ {
            proxy_pass         http://patientportal/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /patient-portal;
        }

        # ── Phase 3: Odoo 17 Community ──────────────────────────────────────────
        # Odoo is designed to run at root (/), not a subpath. The approach:
        #
        #  1. /odoo/ strips the prefix and forwards to Odoo's root.
        #     proxy_redirect rewrites the root-relative Location headers Odoo
        #     emits (e.g. "Location: /web") back to "/odoo/web" so the browser
        #     stays under /odoo/.
        #
        #  2. /web and /longpolling/ are Odoo's own path namespaces that its SPA
        #     JavaScript calls directly (root-relative URLs).  We route them here
        #     so they hit Odoo, not the portal fallback.
        #
        #  3. /odoo/longpolling/ is kept for any client that still uses the
        #     prefixed path.

        location /longpolling/ {
            proxy_pass         http://odoo_be;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
        }

        location /web {
            proxy_pass         http://odoo_be;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Host   $host;
            proxy_read_timeout 300s;
        }

        location /odoo/longpolling/ {
            proxy_pass         http://odoo_be/longpolling/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
        }

        location /odoo/ {
            proxy_pass         http://odoo_be/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Host   $host;
            # Rewrite absolute Location headers Odoo emits so the browser stays
            # under /odoo/.  Negative lookahead avoids double-prefixing paths
            # that already start with /odoo/ (e.g. Odoo 17 /odoo/<module>).
            proxy_redirect     ~^(https?://[^/]+)/(?!odoo/)(.*)$ $1/odoo/$2;
            proxy_read_timeout 300s;
        }
        # ────────────────────────────────────────────────────────────────────────

        # ── Phase 4: Integration Hub ─────────────────────────────────────────────
        location /integration-hub/ {
            proxy_pass         http://hub_be/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
        }
        # ────────────────────────────────────────────────────────────────────────

        # ── Phase 2: OpenELIS Global 2 ──────────────────────────────────────────
        # OpenELIS auto-deploys its WAR at /OpenELIS-Global/ and issues absolute
        # redirects to http://localhost:8082/... — proxy_redirect rewrites those.
        location /OpenELIS-Global/ {
            proxy_pass         http://openelis_be/OpenELIS-Global/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            # Tell Tomcat the original request was HTTPS so its RemoteIpValve
            # sets request.isSecure()=true, suppressing the web.xml CONFIDENTIAL
            # redirect to port 8443. nginx itself remains HTTP-only.
            proxy_set_header   X-Forwarded-Proto  https;
            # Rewrite absolute HTTPS redirects that Spring Security generates
            # back to HTTP so the browser doesn't try to connect on port 443.
            proxy_redirect     https://$host/ http://$host/;
            # Suppress HSTS — sending it over plain HTTP would lock the browser
            # into HTTPS-only for the whole host (including other services).
            proxy_hide_header  Strict-Transport-Security;
            proxy_read_timeout 300s;
        }

        # FHIR R4 API — used by integration-hub and portal backend (via /fhir/)
        location /openelis-fhir/ {
            proxy_pass         http://openelis_be/fhir/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  https;
            proxy_read_timeout 300s;
        }
        # ────────────────────────────────────────────────────────────────────────

        # ── Phase 1: OpenMRS O3 ─────────────────────────────────────────────
        # SPA must come BEFORE the general /openmrs/ block so it matches first.
        # The frontend container serves the built React app at /openmrs/spa/.
        location /openmrs/spa/ {
            proxy_pass         http://openmrs_fe/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            # WebSocket support for O3 live-reload (dev only, harmless in prod)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
        }

        # Backend: REST API, FHIR R4, module resources, login page.
        # Anything under /openmrs/ that is NOT the SPA goes to Tomcat.
        location /openmrs/ {
            proxy_pass         http://openmrs_be/openmrs/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            # Required for OpenMRS to build correct redirect URLs
            proxy_set_header   X-Forwarded-Host   $host;
            proxy_set_header   X-Forwarded-Port   80;
            proxy_read_timeout 300s;  # Liquibase startup health calls can be slow
        }
        # ─────────────────────────────────────────────────────────────────────
    }
}
