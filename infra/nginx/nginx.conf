events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream orthanc       { server orthanc:8042; }
    upstream ohif          { server ohif:80; }
    upstream ris           { server ris:8002; }
    upstream aicontroller  { server ai-controller:8000; }
    upstream simulator     { server simulator:8001; }
    upstream ehr           { server ehr:8003; }
    upstream lis           { server lis:8004; }
    upstream fhirbridge    { server fhir-bridge:8005; }
    upstream admin         { server admin:8011; }
    upstream analytics     { server analytics:8008; }
    upstream mpi           { server mpi:8007; }
    upstream hl7           { server hl7:8009; }
    upstream pharmacy      { server pharmacy:8006; }
    upstream patientportal { server patient-portal:8010; }

    server {
        listen 80;
        root /usr/share/nginx/html;

        # ── Portal entry point ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ @fallback;
        }

        location @fallback {
            rewrite ^.*$ /index.html last;
        }

        # OHIF assets with absolute paths - must come before fallback
        location ~ ^/(app-config\.js|init-service-worker\.js|app\.bundle.*|assets/|[0-9]+\.bundle\..*|[0-9]+\.css)$ {
            proxy_pass http://ohif;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ohif/ {
            proxy_pass         http://ohif/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /ohif;
        }

        # ── Module proxies ──────────────────────────────────────────────
        # Trailing slash on both location and proxy_pass is required so
        # nginx strips the prefix before forwarding to the upstream.

        location /ehr/ {
            proxy_pass         http://ehr/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /ehr;
        }

        location /ris/ {
            proxy_pass         http://ris/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /ris;
        }

        location /lis/ {
            proxy_pass         http://lis/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /lis;
        }

        location /ai-controller/ {
            proxy_pass         http://aicontroller/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /ai-controller;
        }

        location /fhir-bridge/ {
            proxy_pass         http://fhirbridge/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /fhir-bridge;
        }

        location /simulator/ {
            proxy_pass         http://simulator/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /simulator;
        }

        location /orthanc/ {
            proxy_pass         http://orthanc/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /orthanc;
        }

        location /admin/ {
            proxy_pass         http://admin/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /admin;
        }

        location /analytics/ {
            proxy_pass         http://analytics/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /analytics;
        }

        location /mpi/ {
            proxy_pass         http://mpi/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /mpi;
        }

        location /hl7/ {
            proxy_pass         http://hl7/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /hl7;
        }

        location /pharmacy/ {
            proxy_pass         http://pharmacy/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /pharmacy;
        }

        location /patient-portal/ {
            proxy_pass         http://patientportal/;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix /patient-portal;
        }
    }
}
