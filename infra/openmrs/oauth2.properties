# Spring Security OAuth2 explicit endpoints (required by oauth2login 1.x)

# Token endpoint — internal container-to-container
accessTokenUri=http://keycloak:8080/keycloak/realms/openhis/protocol/openid-connect/token

# Authorization endpoint — browser-facing (public nginx URL)
userAuthorizationUri=http://localhost/keycloak/realms/openhis/protocol/openid-connect/auth

# Userinfo endpoint — internal container-to-container
userInfoUri=http://keycloak:8080/keycloak/realms/openhis/protocol/openid-connect/userinfo

# Client credentials
clientId=openmrs
clientSecret=openmrs-keycloak-secret

# Scopes to request
scope=openid profile email

# Redirect URI after login — must match Keycloak client's Valid Redirect URIs
redirectUri=http://localhost/openmrs/oauth2login

# Which JWT claim maps to the OpenMRS username
userNameClaim=preferred_username

# Auto-create OpenMRS user on first Keycloak login
enableAutoCreation=true

# JWK keys URL — used to verify JWT signatures (internal)
keysUrl=http://keycloak:8080/keycloak/realms/openhis/protocol/openid-connect/certs

# User field mappings from Keycloak userinfo → OpenMRS user
openmrs.mapping.user.username=preferred_username
openmrs.mapping.person.givenName=given_name
openmrs.mapping.person.familyName=family_name
openmrs.mapping.user.email=email
openmrs.mapping.user.systemId=sub
