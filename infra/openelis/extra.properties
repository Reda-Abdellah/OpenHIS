# OpenELIS extra.properties — read by AppConfig from /run/secrets/extra.properties
# All properties commented out in the bundled application.properties that Spring
# beans require (no default value in @Value annotation).

# FHIR store — empty string → FhirConfig injects empty Optional/String →
# RegisterFhirHooksTask.startTask() skips FHIR hook registration (isPresent=false).
org.openelisglobal.fhirstore.uri=

# FHIR subscriber — fhirSubscriber field is Optional<String>; empty → no network call.
org.openelisglobal.fhir.subscriber=
org.openelisglobal.fhir.subscriber.resources=Task,Patient,ServiceRequest,DiagnosticReport,Observation,Specimen,Practitioner,Encounter
org.openelisglobal.fhir.subscriber.allowHTTP=true

# Remote source — disable update status sync (no external FHIR source in this deployment).
org.openelisglobal.remote.source.updateStatus=false

# Odoo — disable integration; OdooConnectionConfig is @ConditionalOnProperty so
# all Odoo beans (including TestProductMapping which needs a CSV file) are skipped.
org.openelisglobal.odoo.enabled=false
# RealOdooClient bean is NOT @ConditionalOnProperty so it always instantiates;
# these placeholders satisfy its @Value fields even though Odoo integration is off.
org.openelisglobal.odoo.baseUrl=http://odoo:8069
org.openelisglobal.odoo.database=odoo
org.openelisglobal.odoo.username=admin
org.openelisglobal.odoo.password=admin

# ── Keycloak OIDC SSO ─────────────────────────────────────────────────────
# Enable OAuth2/OIDC login (activates the openidSecurityFilterChain bean)
org.itech.login.oauth=true
# OIDC issuer URI — Spring Security calls {issuerUri}/.well-known/openid-configuration
# Uses http://localhost which resolves to Docker host (via extra_hosts) → nginx → keycloak
org.itech.login.oauth.config=http://localhost/keycloak/realms/openhis
# Keycloak client credentials (must match openelis-oidc client in openhis-realm.json)
org.itech.login.oauth.clientID=openelis-oidc
org.itech.login.oauth.clientSecret=openelis-oidc-secret
